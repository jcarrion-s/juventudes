<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de voto - Presidencia</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    h1 {
      margin: 0 0 8px;
      text-align: center;
      color: #046b76;
      font-size: 2rem;
    }
    .sub {
      text-align: center;
      margin: 0 0 24px;
      color: #4b5563;
    }
    .board {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    .board-header {
      display: grid;
      grid-template-columns: 1.8fr 90px 90px 72px;
      gap: 0;
      background: #dbeafe;
      border-bottom: 1px solid #cbd5e1;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
    }
    .board-header div {
      padding: 12px 8px;
      border-right: 1px solid #cbd5e1;
    }
    .board-header div:last-child { border-right: 0; }

    .row {
      display: grid;
      grid-template-columns: 1.8fr 90px 90px 72px;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .row:last-child { border-bottom: 0; }

    .party {
      padding: 12px;
      font-weight: 700;
      line-height: 1.2;
    }
    .cell {
      padding: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-left: 1px solid #e5e7eb;
      min-height: 84px;
    }
    .logo, .foto {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #d1d5db;
    }
    .casilla {
      width: 46px;
      height: 46px;
      border: 2px solid #6b7280;
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: .15s ease;
    }
    .casilla:hover {
      background: #f9fafb;
      transform: scale(1.03);
    }
    .casilla.seleccionada {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #16a34a;
    }

    .estado {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      text-align: center;
      font-weight: 600;
    }

    @media (max-width: 700px) {
      .board-header {
        display: none;
      }
      .row {
        grid-template-columns: 1fr;
        padding: 12px;
        gap: 10px;
        background: #fff;
      }
      .party {
        padding: 0;
      }
      .cell {
        border-left: 0;
        min-height: auto;
        justify-content: flex-start;
        padding: 0;
      }
      .mobile-line {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .mobile-label {
        min-width: 62px;
        font-size: 12px;
        font-weight: 700;
        color: #4b5563;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Simulador de voto</h1>
    <p class="sub">Módulo inicial de Presidencia con logos, foto y casilla de selección.</p>

    <div class="board" id="board"></div>

    <div class="estado" id="estado">
      Selecciona una casilla para marcar tu voto.
    </div>
  </div>

  <script>
    const data = [
  { partido: "Alianza Venceremos", logo: "assets/presidencia/01-venceremos-logo.png", foto: "assets/presidencia/01-venceremos-presi.jpg" },
  { partido: "Partido Patriótico del Perú", logo: "assets/presidencia/02-patriotico-logo.png", foto: "assets/presidencia/02-patriotico-presi.jpg" },
  { partido: "Partido Cívico Obras", logo: "assets/presidencia/03-civico-obras-logo.png", foto: "assets/presidencia/03-civico-obras-presi.jpg" },
  { partido: "FREPAP", logo: "assets/presidencia/04-fia-logo.png", foto: "assets/presidencia/04-fia-logo.png" },
  { partido: "Partido Demócrata Verde", logo: "assets/presidencia/05-democrata-verde-logo.jpg", foto: "assets/presidencia/05-democrata-verde-presi.jpg" },
  { partido: "Partido del Buen Gobierno", logo: "assets/presidencia/06-buen-gobierno-logo.png", foto: "assets/presidencia/06-buen-gobierno-presi.jpg" },
  { partido: "Perú Acción", logo: "assets/presidencia/07-peru-accion-logo.png", foto: "assets/presidencia/07-peru-accion-presi.jpg" },
  { partido: "PRIN", logo: "assets/presidencia/08-prin-logo.png", foto: "assets/presidencia/08-prin-presi.jpg" },
  { partido: "Progresemos", logo: "assets/presidencia/09-progresemos-logo.png", foto: "assets/presidencia/09-progresemos-presi.jpg" },
  { partido: "Sí Creo", logo: "assets/presidencia/10-si-creo-logo.png", foto: "assets/presidencia/10-si-creo-presi.jpg" },
  { partido: "País para Todos", logo: "assets/presidencia/11-pais-para-todos-logo.png", foto: "assets/presidencia/11-pais-para-todos-presi.jpg" },
  { partido: "Frente Esperanza 2021", logo: "assets/presidencia/12-esperanza2021-logo.png", foto: "assets/presidencia/12-esperanza2021-presi.jpg" },
  { partido: "Perú Libre", logo: "assets/presidencia/13-peru-libre-logo.png", foto: "assets/presidencia/13-peru-libre-presi.jpg" },
  { partido: "Ciudadanos Por el Perú", logo: "assets/presidencia/14-ciudadanos-logo.png", foto: "assets/presidencia/14-ciudadanos-logo.png" },
  { partido: "Primero La Gente", logo: "assets/presidencia/15-primero-la-gente-logo.png", foto: "assets/presidencia/15-primero-la-gente-presi.jpg" },
  { partido: "Juntos por el Perú", logo: "assets/presidencia/16-juntos-logo.png", foto: "assets/presidencia/16-juntos-presi.jpg" },
  { partido: "Podemos Perú", logo: "assets/presidencia/17-podemos-logo.png", foto: "assets/presidencia/17-podemos-presi.jpg" },
  { partido: "Demócrata Federal", logo: "assets/presidencia/18-democrata-federal-logo.png", foto: "assets/presidencia/18-democrata-federal-presi.jpg" },
  { partido: "Fe en el Perú", logo: "assets/presidencia/19-fe-peru-logo.png", foto: "assets/presidencia/19-fe-peru-presi.jpg" },
  { partido: "Integridad Democrática", logo: "assets/presidencia/20-integridad-logo.png", foto: "assets/presidencia/20-integridad-presi.jpg" },
  { partido: "Fuerza Popular", logo: "assets/presidencia/21-fuerza-popular-logo.png", foto: "assets/presidencia/21-fuerza-popular-presi.jpeg" },
  { partido: "Alianza para el Progreso", logo: "assets/presidencia/22-app-logo.png", foto: "assets/presidencia/22-app-presi.jpg" },
  { partido: "Cooperación Popular", logo: "assets/presidencia/23-cooperacion-popular-logo.png", foto: "assets/presidencia/23-cooperacion-popular-presi.jpg" },
  { partido: "Ahora Nación", logo: "assets/presidencia/24-ahora-nacion-logo.png", foto: "assets/presidencia/24-ahora-nacion-presi.jpg" },
  { partido: "Libertad Popular", logo: "assets/presidencia/25-libertad-popular-logo.png", foto: "assets/presidencia/25-libertad-popular-presi.jpg" },
  { partido: "Un Camino Diferente", logo: "assets/presidencia/26-camino-diferente-logo.png", foto: "assets/presidencia/26-camino-diferente-presi.jpg" },
  { partido: "Avanza País", logo: "assets/presidencia/27-avanza-pais-logo.png", foto: "assets/presidencia/27-avanza-pais-presi.jpg" },
  { partido: "Perú Moderno", logo: "assets/presidencia/28-peru-moderno-logo.png", foto: "assets/presidencia/28-peru-moderno-presi.jpg" },
  { partido: "Perú Primero", logo: "assets/presidencia/29-peru-primero-logo.png", foto: "assets/presidencia/29-peru-primero-presi.jpg" },
  { partido: "Salvemos al Perú", logo: "assets/presidencia/30-salvemos-peru-logo.png", foto: "assets/presidencia/30-salvemos-peru-presi.jpg" },
  { partido: "Somos Perú", logo: "assets/presidencia/31-somos-peru-logo.png", foto: "assets/presidencia/31-somos-peru-presi.jpg" },
  { partido: "APRA", logo: "assets/presidencia/32-apra-logo.png", foto: "assets/presidencia/32-apra-presi.jpg" },
  { partido: "Renovación Popular", logo: "assets/presidencia/33-renovacion-popular-logo.png", foto: "assets/presidencia/33-renovacion-popular-presi.jpg" },
  { partido: "Partido Demócrata Unido", logo: "assets/presidencia/34-democrata-unido-logo.png", foto: "assets/presidencia/34-democrata-unido-presi.jpg" },
  { partido: "Fuerza y Libertad", logo: "assets/presidencia/35-fuerza-libertad-logo.png", foto: "assets/presidencia/35-fuerza-libertad-presi.jpg" },
  { partido: "Partido de los Trabajadores y Emprendedores", logo: "assets/presidencia/36-prete-logo.png", foto: "assets/presidencia/36-prete-presi.jpg" },
  { partido: "Unidad Nacional", logo: "assets/presidencia/37-unidad-nacional-logo.png", foto: "assets/presidencia/37-unidad-nacional-presi.jpg" },
  { partido: "Partido Morado", logo: "assets/presidencia/38-partido-morado-logo.png", foto: "assets/presidencia/38-partido-morado-presi.jpg" }
    ];

    const board = document.getElementById("board");
    const estado = document.getElementById("estado");
    let seleccionActual = null;

    function render() {
      board.innerHTML = "";

      const header = document.createElement("div");
      header.className = "board-header";
      header.innerHTML = `
        <div>PARTIDO</div>
        <div>SÍMBOLO</div>
        <div>FOTO</div>
        <div>VOTO</div>
      `;
      board.appendChild(header);

      data.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
          <div class="party">${item.partido}</div>

          <div class="cell">
            <div class="mobile-line">
              <span class="mobile-label">Símbolo</span>
              <img class="logo" src="${item.logo}" alt="Logo de ${item.partido}">
            </div>
          </div>

          <div class="cell">
            <div class="mobile-line">
              <span class="mobile-label">Foto</span>
              <img class="foto" src="${item.foto}" alt="Foto de ${item.partido}">
            </div>
          </div>

          <div class="cell">
            <div class="mobile-line">
              <span class="mobile-label">Voto</span>
              <button class="casilla" data-index="${index}" aria-label="Seleccionar ${item.partido}"></button>
            </div>
          </div>
        `;

        board.appendChild(row);
      });

      document.querySelectorAll(".casilla").forEach(btn => {
        btn.addEventListener("click", () => seleccionar(btn));
      });
    }

    function seleccionar(btn) {
      document.querySelectorAll(".casilla").forEach(c => {
        c.classList.remove("seleccionada");
        c.textContent = "";
      });

      btn.classList.add("seleccionada");
      btn.textContent = "X";

      const index = Number(btn.dataset.index);
      seleccionActual = data[index];

      estado.textContent = `Has seleccionado: ${seleccionActual.partido}`;
    }

    render();
  </script>
</body>
</html>
